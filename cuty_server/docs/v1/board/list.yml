tags:
  - "Board"
summary: "게시판 목록 조회"
description: "전체 게시판의 목록과 각각의 속성 스키마를 조회합니다."
responses:
  200:
    description: "게시판 목록 조회 성공"
    schema:
      type: "object"
      properties:
        status:
          type: "string"
          example: "success"
        data:
          type: "array"
          items:
            type: "object"
            properties:
              id:
                type: "integer"
                example: 1
              name:
                type: "string"
                example: "자유게시판"
              description:
                type: "string"
                example: "자유롭게 이야기를 나누는 공간입니다."
              attribute_schema:
                type: "object"
                example: {"is_accepted": "boolean"}
  500:
    description: "서버 에러 (게시판 조회 실패)"
    schema:
      type: "object"
      properties:
        status:
          type: "string"
          example: "error"
        error:
          type: "object"
          properties:
            message:
              type: "string"
              example: "게시판 목록을 불러오는 중 서버 오류가 발생했습니다."
            details:
              type: "object"
              example: {"error_message": "DB connection failed"}
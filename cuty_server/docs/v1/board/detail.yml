tags:
  - "Board"
summary: "게시판 상세 및 게시글 목록 조회"
description: "특정 게시판의 정보와 해당 게시판에 속한 게시글 목록을 무한 스크롤(커서 기반) 방식으로 조회합니다."
parameters:
  - name: "board_id"
    in: "path"
    required: true
    type: "integer"
    description: "조회할 게시판의 고유 ID"
  - name: "cursor"
    in: "query"
    required: false
    type: "integer"
    description: "이전 페이지의 마지막 게시글 ID (다음 페이지 요청 시 사용, 첫 페이지는 생략)"
  - name: "limit"
    in: "query"
    required: false
    type: "integer"
    default: 20
    description: "한 번에 가져올 게시글의 개수"
responses:
  200:
    description: "조회 성공"
    schema:
      type: "object"
      properties:
        status:
          type: "string"
          example: "success"
        data:
          type: "object"
          properties:
            board_info:
              type: "object"
              properties:
                id:
                  type: "integer"
                  example: 1
                name:
                  type: "string"
                  example: "자유게시판"
                description:
                  type: "string"
                  example: "자유롭게 이야기를 나누는 공간입니다."
                attribute_schema:
                  type: "object"
                  example: {}
            posts:
              type: "object"
              properties:
                items:
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      id:
                        type: "integer"
                        example: 105
                      title:
                        type: "string"
                        example: "오늘 날씨 정말 좋네요"
                      preview_content:
                        type: "string"
                        example: "한강 가서 라면 먹고 싶어요..."
                      category:
                        type: "string"
                        example: "일상"
                      user_id:
                        type: "integer"
                        example: 42
                      views_count:
                        type: "integer"
                        example: 15
                      likes_count:
                        type: "integer"
                        example: 3
                      created_at:
                        type: "string"
                        example: "2026-03-20T02:02:00"
                      extra_data:
                        type: "object"
                        example: null
                next_cursor:
                  type: "integer"
                  example: 85
                  description: "다음 페이지 조회를 위한 커서 값 (더 이상 글이 없으면 null)"
                has_next:
                  type: "boolean"
                  example: true
  400:
    description: "잘못된 요청 (존재하지 않는 게시판)"
    schema:
      type: "object"
      properties:
        status:
          type: "string"
          example: "error"
        error:
          type: "object"
          properties:
            message:
              type: "string"
              example: "존재하지 않는 게시판입니다."
            code:
              type: "string"
              example: "BAD_REQUEST"